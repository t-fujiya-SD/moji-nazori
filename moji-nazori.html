<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="もじなぞり">
<meta name="theme-color" content="#aee4ff">
<meta name="robots" content="noindex, nofollow">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-180.png">
<link rel="icon" href="icon-192.png">
<title>采生くんの もじ・すうじ なぞり</title>
<style>
  :root{
    --sky-top:#aee4ff; --sky-bottom:#e3f6ff;
    --ink:#33445e; --ink-soft:#6b7c96;
    --sun:#ffcf3f; --coral:#ff7a59; --coral-dark:#e85f3e;
    --grass:#74d680; --grass-dark:#5bbf68;
    --card:#ffffff; --line:#cfe0ef;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent; -webkit-user-select:none; user-select:none;}
  html,body{margin:0; padding:0; height:100%; overscroll-behavior:none;}
  body{
    font-family:'Hiragino Maru Gothic ProN','ヒラギノ丸ゴ ProN W4','Rounded Mplus 1c',-apple-system,sans-serif;
    color:var(--ink); background:linear-gradient(180deg,var(--sky-top),var(--sky-bottom) 60%);
    overflow:hidden; -webkit-text-size-adjust:100%;
    position:fixed; inset:0; width:100%; touch-action:none;
  }
  #app{height:100vh; height:100dvh; width:100%; position:relative; overflow:hidden;}
  .screen{height:100%; width:100%; display:flex; flex-direction:column; align-items:center; position:relative;}
  .cloud{position:absolute; font-size:42px; opacity:.85; animation:drift 24s linear infinite;}
  .cloud.c2{font-size:30px; opacity:.7; animation-duration:32s;}
  @keyframes drift{from{transform:translateX(-20vw)} to{transform:translateX(120vw)}}

  .btn{border:none; border-radius:22px; font-family:inherit; font-weight:800; color:#fff; cursor:pointer;
    padding:16px 28px; font-size:21px; background:var(--coral); box-shadow:0 6px 0 var(--coral-dark); transition:transform .07s, box-shadow .07s;}
  .btn:active{transform:translateY(4px); box-shadow:0 2px 0 var(--coral-dark);}
  .btn.big{font-size:27px; padding:20px 42px; border-radius:28px;}
  .btn.grass{background:var(--grass); box-shadow:0 6px 0 var(--grass-dark);}
  .btn.grass:active{box-shadow:0 2px 0 var(--grass-dark);}
  .btn.ghost{background:#fff; color:var(--ink); box-shadow:0 5px 0 var(--line); font-size:18px; padding:14px 22px;}
  .btn.ghost:active{box-shadow:0 1px 0 var(--line);}
  .speaker{width:72px; height:72px; border-radius:50%; border:none; background:var(--sun);
    box-shadow:0 6px 0 #d6a92a; font-size:34px; cursor:pointer; transition:transform .07s, box-shadow .07s;}
  .speaker:active{transform:translateY(4px); box-shadow:0 2px 0 #d6a92a;}

  /* title */
  .title-screen{justify-content:center; gap:6px;}
  .title-name{font-size:22px; color:var(--ink-soft); font-weight:800;}
  .title{font-size:38px; margin:0; text-shadow:0 3px 0 #fff; text-align:center; line-height:1.2;}
  .title-train{font-size:66px; margin:10px 0 22px; animation:bob 1.6s ease-in-out infinite;}
  @keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
  .hint{color:var(--ink-soft); font-size:15px; margin-top:20px; padding:0 24px; text-align:center;}

  /* category select */
  .topbar{width:100%; padding:16px 16px 4px; text-align:center; position:relative;}
  .topbar h2{margin:0; font-size:21px;}
  .cats{flex:1; display:flex; flex-direction:column; align-items:center; justify-content:flex-start; gap:14px; padding:10px 22px 30px; width:100%;
    overflow-y:auto; -webkit-overflow-scrolling:touch; touch-action:pan-y; overscroll-behavior:contain;}
  .cats::-webkit-scrollbar{display:none;}
  .catbtn{width:100%; max-width:360px; border:none; border-radius:24px; cursor:pointer; padding:22px;
    font-family:inherit; font-weight:800; font-size:26px; color:#fff; box-shadow:0 6px 0 rgba(0,0,0,.18);
    display:flex; align-items:center; justify-content:space-between; transition:transform .07s, box-shadow .07s;}
  .catbtn:active{transform:translateY(4px); box-shadow:0 2px 0 rgba(0,0,0,.18);}
  .catbtn.locked{opacity:.5; filter:grayscale(.5);}
  .catbtn.locked small{font-weight:800; opacity:.95;}
  .catbtn.shake{animation:shake .4s;}
  @keyframes shake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-7px)}40%,80%{transform:translateX(7px)}}
  .catbtn small{font-size:15px; font-weight:800; opacity:.92;}
  .catbtn .ex{font-size:30px;}

  /* voice picker */
  .voicelist{flex:1; width:100%; max-width:430px; margin:0 auto; overflow-y:auto; -webkit-overflow-scrolling:touch; touch-action:pan-y; overscroll-behavior:contain; padding:8px 18px 28px; display:flex; flex-direction:column; gap:10px;}
  .voicelist::-webkit-scrollbar{display:none;}
  .vrow{display:flex; align-items:center; gap:12px; border:none; border-radius:18px; background:#fff; box-shadow:0 4px 0 var(--line); padding:14px 18px; font-family:inherit; font-weight:800; font-size:20px; color:var(--ink); cursor:pointer; transition:transform .07s, box-shadow .07s;}
  .vrow:active{transform:translateY(2px); box-shadow:0 2px 0 var(--line);}
  .vrow .ve{font-size:28px;}
  .vrow.sel{background:#eafff0; box-shadow:0 4px 0 var(--grass-dark);}
  .vrow .tag{margin-left:auto; font-size:13px; color:var(--ink-soft); font-weight:800;}
  .vrow.sel .tag{color:var(--grass-dark);}

  /* char grid */
  .gridhead{width:100%; padding:12px 16px 6px; display:flex; align-items:center; justify-content:space-between; gap:8px;}
  .back{font-size:16px; color:var(--ink-soft); background:none; border:none; font-family:inherit; font-weight:800; cursor:pointer;}
  .count{font-size:15px; color:var(--ink-soft); font-weight:800;}
  .mytrain{width:100%; padding:2px 14px 8px; display:flex; gap:4px; align-items:center; overflow-x:auto; flex-shrink:0; touch-action:pan-x;}
  .mytrain::-webkit-scrollbar{display:none;}
  .car{flex:0 0 auto; min-width:46px; height:40px; border-radius:11px 11px 7px 7px; background:#fff;
    display:flex; align-items:center; justify-content:center; font-size:20px; font-weight:800; box-shadow:0 3px 0 var(--line);}
  .car.engine{background:var(--coral); box-shadow:0 3px 0 var(--coral-dark); font-size:22px;}
  .coupler{flex:0 0 auto; width:7px; height:4px; background:#9fb2c9; border-radius:2px;}
  .scroll{flex:1; width:100%; overflow-y:auto; -webkit-overflow-scrolling:touch; touch-action:pan-y; overscroll-behavior:contain; padding:6px 14px 36px;}
  .scroll::-webkit-scrollbar{display:none;}
  /* 基礎（すうじ/ひらがな/ABC/カタカナ）は 5こずつで改行＝1行クリアで でんしゃ2両 */
  .cgrid{display:grid; grid-template-columns:repeat(5,1fr); gap:12px; max-width:520px; margin:0 auto;}
  .cc{aspect-ratio:1/1; background:#fff; border-radius:18px; border:4px solid #e7eef6; display:flex; align-items:center; justify-content:center;
    font-size:34px; font-weight:800; color:var(--ink); cursor:pointer; box-shadow:0 5px 0 var(--line); transition:transform .07s, box-shadow .07s; position:relative;}
  .cc:active{transform:translateY(3px); box-shadow:0 2px 0 var(--line);}
  .ccblank{aspect-ratio:1/1; pointer-events:none;}
  .cc.done{border-color:var(--grass); background:#eafff0;}
  .cc .ck{position:absolute; top:-8px; right:-8px; font-size:22px;}
  /* word cells (ことば mode) */
  .cgrid.wordgrid{grid-template-columns:repeat(auto-fill,minmax(96px,1fr)); max-width:560px;}
  .cc.word{aspect-ratio:auto; flex-direction:column; gap:2px; padding:12px 6px;}
  .cc.word .cc-emo{font-size:36px; line-height:1;}
  .cc.word .cc-word{font-size:17px; font-weight:800; color:var(--ink);}
  .cgrid.traingrid{grid-template-columns:repeat(auto-fill,minmax(150px,1fr)); max-width:680px;}
  .cc.train{aspect-ratio:auto; flex-direction:column; gap:2px; padding:8px 6px;}
  .cc.train .cc-train{width:100%; height:auto; max-height:78px; object-fit:contain;}
  .cc.train .cc-word{font-size:14px; font-weight:800; color:var(--ink);}
  .cc.locked{opacity:.6; filter:grayscale(.85); background:#eef2f7; border-color:#dbe3ec; cursor:default;}
  .cc.train.locked{min-height:96px;}
  .cc.train.locked .cc-lock{font-size:40px; line-height:1;}
  .cc.train.locked .cc-word{opacity:.75; letter-spacing:2px;}
  .cc.shake{animation:shake .4s;}
  .trace-label .hint-emo{font-size:30px; vertical-align:middle;}
  .bigc.word{font-size:26px;}
  .complete .gotc.word{font-size:34px;}

  /* trace */
  .play-head{width:100%; padding:14px 16px 4px; display:flex; align-items:center; justify-content:space-between;}
  .bigc{font-size:40px; font-weight:800;}
  .trace-label{font-size:17px; color:var(--ink-soft); font-weight:800; padding:2px 0 6px;}
  .canvas-wrap{flex:1; width:100%; display:flex; align-items:center; justify-content:center; padding:0 14px;}
  .canvas-wrap.twin{gap:16px;}
  .cv-col{display:flex; flex-direction:column; align-items:center; justify-content:center;}
  .cv-cap{font-size:15px; color:var(--ink-soft); font-weight:800; margin-bottom:5px;}
  canvas{background:#fff; border-radius:24px; box-shadow:0 8px 22px rgba(40,60,90,.14); touch-action:none; border:3px solid #eef3f8;}
  .footer-btns{display:flex; gap:12px; align-items:center; justify-content:center; padding:14px 0; flex-wrap:wrap;}
  .footer-btns .done-btn{font-size:20px; padding:14px 30px;}

  /* complete */
  .complete{justify-content:center; gap:8px; text-align:center; padding:0 20px;}
  .complete .big-emoji{font-size:74px; animation:bob 1.4s ease-in-out infinite;}
  .complete h2{font-size:32px; margin:4px 0;}
  .complete .gotc{font-size:64px; font-weight:800;}
  .new-car{font-size:16px; color:var(--ink-soft);}
  .new-car .car{display:inline-flex; vertical-align:middle; margin:0 4px;}
  /* バッジ祝福 */
  .badge-won{display:flex; align-items:center; gap:12px; justify-content:center; background:#fff7df; border:3px solid #ffcf3f; border-radius:18px; padding:10px 18px; margin:8px auto 2px; max-width:340px; box-shadow:0 5px 0 #e7b730; font-size:40px; font-weight:800; animation:pop .5s cubic-bezier(.34,1.56,.64,1);}
  .badge-won div{font-size:18px; color:var(--ink); line-height:1.25; text-align:left;}
  .badge-won small{display:block; font-size:13px; color:var(--ink-soft);}
  .badge-won.grand{background:#fff0f6; border-color:#ff7aa8; box-shadow:0 5px 0 #e85f8e;}
  @keyframes pop{0%{transform:scale(.5); opacity:0;}100%{transform:scale(1); opacity:1;}}
  /* がんばりひょう */
  .psum{text-align:center; font-size:16px; font-weight:800; color:var(--ink); margin:4px 0 14px;}
  .psum b{color:var(--coral);}
  .prow{display:flex; align-items:center; gap:12px; max-width:460px; margin:0 auto 12px; padding:0 6px;}
  .pmedal{flex:0 0 auto; width:52px; height:52px; border-radius:50%; border:4px solid var(--line); background:#fff; display:flex; align-items:center; justify-content:center; font-size:23px; font-weight:800; box-shadow:0 3px 0 rgba(0,0,0,.08);}
  .pmedal.earned{background:#fff7df; box-shadow:0 3px 0 #e7b730;}
  .pmain{flex:1; min-width:0;}
  .plabel{font-size:16px; font-weight:800; color:var(--ink); margin-bottom:5px;}
  .plabel small{color:var(--ink-soft); font-weight:800;}
  .ptrack{position:relative; height:16px; background:#e7eef6; border-radius:10px;}
  .pfill{height:100%; border-radius:10px; transition:width .4s;}
  .ploco{position:absolute; top:50%; transform:translate(-50%,-58%); font-size:18px; line-height:1;}
  .tcoll-title{text-align:center; font-size:16px; font-weight:800; color:var(--ink); margin:16px 0 8px;}
  .tcoll-title b{color:var(--coral);}
  .tcoll{display:grid; grid-template-columns:repeat(auto-fill,minmax(120px,1fr)); gap:8px; max-width:560px; margin:0 auto;}
  .tcell{background:#fff; border-radius:12px; box-shadow:0 3px 0 var(--line); padding:6px; display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:74px;}
  .tcell img{width:100%; height:auto; max-height:52px; object-fit:contain;}
  .tcell .tname{font-size:11px; font-weight:800; color:var(--ink-soft); margin-top:2px; text-align:center; line-height:1.1;}
  .tcell:not(.got){background:#e7eef6;}
  .tcell .tq{font-size:26px; color:#b9c8d8; font-weight:800;}
  /* おうちのかたモード */
  .psec{max-width:560px; margin:0 auto 14px; background:#fff; border-radius:14px; padding:10px 12px; box-shadow:0 3px 0 var(--line);}
  .ptitle{display:flex; align-items:center; gap:8px; font-size:15px; color:var(--ink); margin-bottom:8px;}
  .ptitle small{color:var(--ink-soft); font-weight:800;}
  .preset{margin-left:auto; border:none; background:#ffe8e8; color:#c0392b; font-family:inherit; font-weight:800; font-size:12px; border-radius:10px; padding:5px 10px; cursor:pointer;}
  .pgrid2{display:flex; flex-wrap:wrap; gap:5px;}
  .pchip{border:2px solid #e7eef6; background:#fff; border-radius:9px; font-family:inherit; font-weight:800; font-size:14px; color:var(--ink); padding:5px 8px; cursor:pointer; min-width:32px;}
  .pchip.don{background:#eafff0; border-color:var(--grass); color:#1e7c3c;}
  .confetti{position:fixed; top:-20px; width:12px; height:18px; border-radius:3px; z-index:50; pointer-events:none;}
  @keyframes fall{to{transform:translateY(110vh) rotate(540deg); opacity:.9;}}

  /* collection train (grows by 1 car per clear) */
  .ctrain{display:flex; align-items:flex-end; gap:2px; overflow-x:auto; max-width:100%; padding:10px 14px 14px; flex-shrink:0; touch-action:pan-x;}
  .ctrain::-webkit-scrollbar{display:none;}
  .ceng{position:relative; flex:0 0 auto; width:52px; height:40px; filter:drop-shadow(0 2px 1px rgba(40,60,90,.18));}
  .ceng-body{position:absolute; left:0; right:0; top:0; bottom:7px; background:linear-gradient(#ff9170,#e85f3e); border:1.5px solid #cf4d2e; border-radius:17px 9px 7px 7px; box-shadow:inset 0 2px 2px rgba(255,255,255,.35);}
  .ceng-win{position:absolute; left:6px; top:6px; width:15px; height:12px; background:linear-gradient(#dff1fc,#bfe3f7); border:1px solid #a9cbe0; border-radius:6px 3px 3px 3px;}
  .ceng-light{position:absolute; left:5px; bottom:3px; width:7px; height:5px; background:#fff6c0; border-radius:2px; box-shadow:0 0 6px #ffe066;}
  .ccar{position:relative; flex:0 0 auto; width:46px; height:38px; filter:drop-shadow(0 2px 1px rgba(40,60,90,.18));}
  .ccar-body{position:absolute; left:0; right:0; top:0; bottom:7px; background:linear-gradient(#fdfeff,#d7e2ec); border:1.5px solid #bcc9d6; border-radius:8px 8px 6px 6px; overflow:hidden; box-shadow:inset 0 2px 2px rgba(255,255,255,.55);}
  .ccar-win{position:absolute; left:4px; right:4px; top:4px; height:8px; background:linear-gradient(#3c5c7a,#27405a); border-radius:3px;}
  .ccar-stripe{position:absolute; left:0; right:0; bottom:4px; display:flex; flex-direction:column; gap:1px;}
  .ccar-stripe i{display:block; height:3.5px;}
  .ccar-wheel{position:absolute; bottom:0; width:9px; height:9px; background:radial-gradient(circle at 40% 35%, #6f6f6f, #222); border:1.5px solid #4a4a4a; border-radius:50%;}
  .ccpl{flex:0 0 auto; width:5px; height:4px; background:#8a99a8; align-self:flex-end; margin-bottom:14px; border-radius:2px;}
  .ccar.newcar{animation:coupleIn .6s cubic-bezier(.34,1.56,.64,1);}
  @keyframes coupleIn{0%{transform:translateX(50px) translateY(-6px); opacity:0;}60%{transform:translateX(-3px) translateY(0);}100%{transform:translateX(0); opacity:1;}}
  .cnone{font-size:13px; color:var(--ink-soft); align-self:center; padding-left:6px;}
  .newline{font-size:18px; font-weight:800; color:var(--ink); margin:2px 0;}
  .newline small{font-size:13px; color:var(--ink-soft); font-weight:800;}

  /* passing JR-line train (reward) */
  .jr-train{position:fixed; left:0; z-index:60; pointer-events:none; display:flex; align-items:flex-end; gap:2px; will-change:transform;}
  .jr-car{position:relative; width:84px; height:52px; flex:0 0 auto;}
  .jr-body{position:absolute; top:0; left:0; right:0; height:44px; background:linear-gradient(#fcfeff,#d9e3ec); border:2px solid #c2ceda; border-radius:8px; overflow:hidden;}
  .jr-car.front.nose-right .jr-body{border-top-right-radius:22px; border-bottom-right-radius:4px;}
  .jr-car.front.nose-left .jr-body{border-top-left-radius:22px; border-bottom-left-radius:4px;}
  .jr-win{position:absolute; top:7px; left:7px; right:7px; height:12px; display:flex; gap:3px;}
  .jr-win span{flex:1; background:#27405a; border-radius:2px; opacity:.92;}
  .jr-stripe{position:absolute; left:0; right:0; top:56%; transform:translateY(-50%); display:flex; flex-direction:column; gap:1px;}
  .jr-stripe i{display:block; height:5px;}
  .jr-shield{position:absolute; top:8px; width:14px; height:15px; background:#cfe9f7; border:1px solid #a9cbe0; border-radius:3px;}
  .nose-right .jr-shield{right:5px;} .nose-left .jr-shield{left:5px;}
  .jr-head{position:absolute; bottom:10px; width:7px; height:5px; background:#fff6c0; border-radius:2px; box-shadow:0 0 6px #ffe066;}
  .nose-right .jr-head{right:3px;} .nose-left .jr-head{left:3px;}
  .jr-bogie{position:absolute; bottom:0; width:14px; height:14px; background:#2b2b2b; border:2px solid #585858; border-radius:50%;}
  .jr-coupler{align-self:flex-end; width:6px; height:5px; background:#8a99a8; border-radius:2px; margin-bottom:20px; flex:0 0 auto;}
  @keyframes jr-go-r{from{transform:translateX(-118vw)} to{transform:translateX(118vw)}}
  @keyframes jr-go-l{from{transform:translateX(118vw)} to{transform:translateX(-118vw)}}
  .jr-cap{position:fixed; top:12%; left:50%; transform:translate(-50%,-10px); background:#fff; border-radius:16px; padding:9px 18px; font-size:19px; font-weight:800; color:#33445e; box-shadow:0 8px 18px rgba(0,0,0,.18); z-index:70; opacity:0; transition:opacity .3s, transform .3s; pointer-events:none; display:flex; align-items:center; gap:9px;}
  .jr-cap.show{opacity:1; transform:translate(-50%,0);}
  .jr-cap b{width:15px; height:15px; border-radius:50%; display:inline-block;}

  /* reward scene: a big train crosses slowly, recognizable by type */
  .reward-screen{justify-content:center; overflow:hidden;}
  .reward-cap{position:fixed; top:13%; left:50%; transform:translateX(-50%); background:#fff; border-radius:18px;
    padding:12px 22px; font-size:22px; font-weight:800; color:var(--ink); box-shadow:0 8px 20px rgba(0,0,0,.16);
    display:flex; align-items:center; gap:10px; z-index:6; white-space:nowrap; max-width:92vw;}
  .reward-cap b{width:18px; height:18px; border-radius:50%; display:inline-block; flex:0 0 auto;}
  .reward-hint{position:fixed; bottom:9%; left:50%; transform:translateX(-50%); color:var(--ink-soft); font-size:16px; font-weight:800; z-index:6;}
  .bigtrain{position:fixed; top:42%; left:0; display:flex; align-items:flex-end; gap:3px; z-index:5;
    will-change:transform; transform:translateX(-135vw); animation:bt-cross 3.8s linear forwards;}
  @keyframes bt-cross{from{transform:translateX(-135vw)} to{transform:translateX(135vw)}}
  .bigtrain.imgmode{top:34%; align-items:center;}
  .bt-img{width:78vw; max-width:360px; height:auto; display:block;}
  .bt-car{position:relative; width:150px; height:92px; flex:0 0 auto; filter:drop-shadow(0 5px 3px rgba(40,60,90,.22));}
  .bt-body{position:absolute; left:0; right:0; top:16px; bottom:16px; background:linear-gradient(#ffffff,#dae4ee);
    border:2.5px solid #c2ceda; border-radius:12px 12px 8px 8px; overflow:hidden;}
  .bt-win{position:absolute; top:9px; left:12px; right:12px; height:20px; display:flex; gap:5px;}
  .bt-win span{flex:1; background:linear-gradient(#3c5c7a,#22384f); border-radius:4px; opacity:.95;}
  .bt-stripe{position:absolute; left:0; right:0; bottom:12px; display:flex; flex-direction:column; gap:2px;}
  .bt-stripe i{display:block; height:7px;}
  .bt-head{position:absolute; top:50%; transform:translateY(-50%); right:6px; width:12px; height:9px;
    background:#fff6c0; border-radius:3px; box-shadow:0 0 12px 3px #ffe066; z-index:3;}
  .bt-wheel{position:absolute; bottom:0; width:18px; height:18px; background:radial-gradient(circle at 40% 35%,#777,#222);
    border:2.5px solid #4a4a4a; border-radius:50%;}
  .bt-coupler{align-self:flex-end; width:8px; height:7px; background:#8a99a8; border-radius:2px; margin-bottom:30px; flex:0 0 auto;}
  .bt-pan{position:absolute; top:1px; left:38%; width:26px; height:15px; z-index:2;}
  .bt-pan::before{content:""; position:absolute; top:0; left:-4px; right:-4px; height:3px; background:#333; border-radius:2px;}
  .bt-pan::after{content:""; position:absolute; bottom:0; left:50%; transform:translateX(-50%);
    width:0; height:0; border-left:11px solid transparent; border-right:11px solid transparent; border-bottom:12px solid #4a4a4a;}

const VOICE_PREF={
  ja:['kyoko','o-ren','otoya','hattori','siri','google 日本語','拡張','premium','enhanced'],
  en:['samantha','karen','moira','nicky','aaron','google us english','daniel','enhanced','premium']
};
function baseName(n){ return (n||'').split(' (')[0].trim(); }
function pickVoice(lang){
  const pref=(lang||'en').slice(0,2);
  const cands=voices.filter(v=>v.lang&&v.lang.toLowerCase().startsWith(pref));
  if(!cands.length) return null;
  if(state.voice){ const v=cands.find(x=>baseName(x.name).toLowerCase()===state.voice.toLowerCase()); if(v) return v; }
  for(const n of (VOICE_PREF[pref]||[])){ const v=cands.find(x=>x.name&&x.name.toLowerCase().includes(n)); if(v) return v; }
  return cands[0];
}
function speak(t,lang){
  { var _vm=(typeof VVS!=='undefined')?VVS[state.voice]:null; if(_vm && _vm[t]){ if(playClip(_vm[t])) return; } }   // VOICEVOX同梱音声（ずんだもん/青山龍星 等）
  if(!('speechSynthesis' in window))return; try{
  if(curAudio){ curAudio.pause(); curAudio=null; }
  speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(t);
  u.lang=lang||'en-US';
  u.rate=0.86; u.pitch=1.4;                 // 明るく・はずんだ感じ（子供向け）
  const v=voiceCache[u.lang]||(voiceCache[u.lang]=pickVoice(u.lang)); if(v)u.voice=v;
  speechSynthesis.speak(u);
}catch(e){} }
let actx=null; function ensureAudio(){ try{ if(!actx)actx=new (window.AudioContext||window.webkitAudioContext)(); if(actx.state==='suspended')actx.resume(); }catch(e){} }
function chime(kind){ ensureAudio(); if(!actx)return; const now=actx.currentTime; const notes=kind==='correct'?[523,659,784,1047]:[392,294]; notes.forEach((f,i)=>{ const o=actx.createOscillator(),g=actx.createGain(); o.type='sine'; o.frequency.value=f; const t=now+i*0.10; g.gain.setValueAtTime(0.0001,t); g.gain.exponentialRampToValueAtTime(0.25,t+0.02); g.gain.exponentialRampToValueAtTime(0.0001,t+0.30); o.connect(g); g.connect(actx.destination); o.start(t); o.stop(t+0.32); }); }

/* でんしゃ カテゴリ: 画像のある路線名(よみ)をなぞる → その顔つき電車をコレクション */
const TRAIN_LINES=JR_LINES.filter(l=>TRAINIMG[l.name]);
const TRAIN_BY_YOMI={}; TRAIN_LINES.forEach(l=>{ TRAIN_BY_YOMI[l.yomi]=l; });
CATS.push({ key:'train', label:'でんしゃ', ex:'🚃', color:'#4a7fe0', lang:'ja-JP', word:true, train:true,
  chars:TRAIN_LINES.map(l=>l.yomi), say:c=>c,
  img:(function(){ const m={}; TRAIN_LINES.forEach(l=>{ m[l.yomi]=TRAINIMG[l.name]; }); return m; })() });
/* でんしゃコレクション: もじ等を5こクリアするごとに 顔つき電車が2本ずつ なかまいり
   （あいうえお→2本、かきくけこ→2本、アイウエオ→2本…。でんしゃ自身はカウントに含めない）。
   でんしゃ画面のタイルも この本数ぶんだけ 解放され、ごほうびも同じ集合を循環（かぶらない） */
function catDoneCount(key){ const c=catOf(key); return c?c.chars.filter(ch=>state.done&&state.done[dk(key,ch)]).length:0; }
function trainRawCount(){ let n=0; CATS.forEach(c=>{ if(c.key==='train') return; n+=2*Math.floor(catDoneCount(c.key)/5); }); return n; }
function trainCollectCount(){ return Math.min(TRAIN_LINES.length, trainRawCount()); }
function unlockedTrains(){ return TRAIN_LINES.slice(0, trainCollectCount()); }
function nextRewardLine(){
  const pool=unlockedTrains(); if(!pool.length) return TRAIN_LINES[0]||JR_LINES[0];
  const i=(state.trainRot||0)%pool.length; state.trainRot=((state.trainRot||0)+1)%100000; saveState();
  return pool[i];
}
function passingTrain(delay, showCaption){
  delay=delay||0;
  const line=JR_LINES[Math.floor(Math.random()*JR_LINES.length)];
  const dir=Math.random()<0.5?'r':'l';
  const noseSide=dir==='r'?'right':'left';
  const top=26+Math.random()*48, dur=2.3+Math.random()*0.9;
  const wins='<span></span>'.repeat(4);
  const stripes=line.stripes.map(c=>`<i style="background:${c}"></i>`).join('');
  const car=front=>`<div class="jr-car ${front?'front nose-'+noseSide:''}">`
    +`<div class="jr-body"><div class="jr-win">${wins}</div><div class="jr-stripe">${stripes}</div>${front?'<em class="jr-shield"></em>':''}</div>`
    +`<b class="jr-bogie" style="left:14%"></b><b class="jr-bogie" style="right:14%"></b>${front?'<u class="jr-head"></u>':''}</div>`;
  let parts=[car(true),car(false),car(false)];
  if(dir==='r') parts.reverse();
  const el=document.createElement('div');
  el.className='jr-train'; el.style.top=top+'vh';
  el.innerHTML=parts.join('<b class="jr-coupler"></b>');
  el.style.animation=`jr-go-${dir} ${dur}s linear ${delay}s forwards`;
  document.body.appendChild(el);
  el.addEventListener('animationend',()=>el.remove());
  setTimeout(()=>{ if(el.parentNode) el.remove(); }, (delay+dur)*1000+600);
  if(showCaption){
    const cap=document.createElement('div'); cap.className='jr-cap';
    const em=line.kind==='sk'?'🚅':(line.kind==='ltd'?'🚄':'🚃');
    cap.innerHTML=`<b style="background:${line.stripes[0]}"></b>${em} ${lineYomi(line)}`;
    document.body.appendChild(cap);
    setTimeout(()=>cap.classList.add('show'), delay*1000+200);
    setTimeout(()=>cap.classList.remove('show'), delay*1000+2000);
    setTimeout(()=>{ if(cap.parentNode) cap.remove(); }, delay*1000+2600);
  }
}

  const rows=CATS.map(c=>{

    saveState(); renderParent();
  });
}

function voiceOptions(){
  const ja=voices.filter(v=>v.lang&&v.lang.toLowerCase().startsWith('ja'));

}

/* ---------- char grid ---------- */
function renderGrid(key){
  const cat=catOf(key);
  const doneChars=cat.chars.filter(ch=>state.done[dk(key,ch)]);
  const tc=cat.train?trainCollectCount():0;
  const cells=cat.chars.map((ch,idx)=>{
    const d=state.done[dk(key,ch)];
    if(cat.train){
      if(idx>=tc){
        return `<div class="cc train locked" data-c="${ch}"><span class="cc-lock">🔒</span><span class="cc-word">？？？</span></div>`;
      }
      return `<div class="cc train ${d?'done':''}" data-c="${ch}"><img class="cc-train" src="${cat.img[ch]}" alt=""><span class="cc-word">${ch}</span>${d?'<span class="ck">⭐️</span>':''}</div>`;
    }
    if(cat.word){
      const pic=picOf(cat,ch);

const GEO=(function(){
  const NS='http://www.w3.org/2000/svg';
  const svg=document.createElementNS(NS,'svg'); svg.style.cssText='position:absolute;left:-9999px;top:-9999px;width:0;height:0';
  const path=document.createElementNS(NS,'path'); svg.appendChild(path);
  if(document.body) document.body.appendChild(svg); else document.addEventListener('DOMContentLoaded',()=>document.body.appendChild(svg));
  return {
    start(d){ path.setAttribute('d',d); let len=32; try{len=path.getTotalLength()||32;}catch(e){} const a=path.getPointAtLength(0); const b=path.getPointAtLength(Math.min(8,len*0.3)); return {x:a.x,y:a.y,dx:b.x-a.x,dy:b.y-a.y}; },
    samples(d,step){ path.setAttribute('d',d); let len=0; try{len=path.getTotalLength()||0;}catch(e){} const n=Math.max(2,Math.ceil(len/(step||3))); const out=[]; for(let i=0;i<=n;i++){ const p=path.getPointAtLength(len*i/n); out.push({x:p.x,y:p.y}); } return out; }
  };
})();

const THRESH=0.75;   // 文字の何割を塗れたらクリアか（多画文字が1画で終わらない高さ。甘さ調整はここ）
function renderTrace(key, ch){
  const cat=catOf(key);
  const isWord=!!cat.word;
  const pic=isWord?picOf(cat,ch):'';
  const acceptLine=isWord?0.45:0.6;   // ✓「できた」で認める塗り割合（手動判定なのでやさしめ）
  const kvgD = (key==='hira' && typeof HKVG!=='undefined' && HKVG[ch]) ? HKVG[ch]
             : (key==='kata' && typeof KKVG!=='undefined' && KKVG[ch]) ? KKVG[ch] : null;
  const canWatch = !!kvgD || (typeof STROKEPATH!=='undefined' && !!STROKEPATH[ch]);
  const label=isWord
    ? `${pic?`<span class="hint-emo">${pic}</span> `:''}<b>${ch}</b> を なぞってね`
    : 'うすい もじを なぞってね';
  app.innerHTML=`
  <div class="screen">
    <div class="play-head">
      <button class="back" id="back">‹ もどる</button>
      <div class="bigc${isWord?' word':''}">${ch}</div>
      <button class="speaker" id="spk">🔊</button>
    </div>
    <div class="trace-label">${label}</div>
    ${isWord
      ? '<div class="canvas-wrap"><canvas id="cv"></canvas></div>'
      : `<div class="canvas-wrap twin">
           <div class="cv-col"><div class="cv-cap">✏️ なぞってみよう</div><canvas id="cv"></canvas></div>
           <div class="cv-col"><div class="cv-cap">🖐️ じぶんで かこう</div><canvas id="cv2"></canvas></div>
         </div>`}
    <div class="footer-btns">
      <button class="btn ghost" id="order"></button>
      <button class="btn ghost" id="pen"></button>
      ${canWatch?'<button class="btn ghost" id="watch">▶ みる</button>':''}
      <button class="btn ghost" id="clear">もういちど</button>
      <button class="btn grass done-btn" id="done">✓ できた</button>
    </div>
  </div>`;
  $('#back').onclick=()=>{ clearTimeout(settleT); renderGrid(key); };
  $('#spk').onclick=()=>speak(cat.say(ch), cat.lang);
  const orderBtn=$('#order');
  function syncOrderBtn(){ orderBtn.textContent = ORDER_ON?'① 書き順 ✓':'① 書き順'; }
  syncOrderBtn();
  orderBtn.onclick=()=>{ if(playing)return; ORDER_ON=!ORDER_ON; state.orderOn=ORDER_ON; saveState(); syncOrderBtn(); redraw(); };
  const penBtn=$('#pen');
  function syncPenBtn(){ penBtn.textContent='✏ '+({thin:'ほそい',med:'ふつう',thick:'ふとい'}[state.pen||'med']); }
  syncPenBtn();
  penBtn.onclick=()=>{ if(playing)return; const od=['thin','med','thick']; state.pen=od[(od.indexOf(state.pen||'med')+1)%3]; saveState(); applyPen(); syncPenBtn(); redraw(); if(typeof fredraw==='function') fredraw(); };

  const cv=$('#cv'), ctx=cv.getContext('2d');
  const dpr=Math.min(window.devicePixelRatio||1,2);
  let side,cw,fontSize,baseOff,S,R,inkW,cols,rows,target,covered,totalT,coveredN,strokes=[],drawing=false,done=false,penSeen=false,settleT=null,playing=false;
  let kscale=1,koff=0,kpaths=null,kstarts=null;
  const useKvg=(key==='hira' && typeof HKVG!=='undefined' && !!HKVG[ch]);
  const FONT=()=>'bold '+fontSize+'px "Hiragino Maru Gothic ProN","Rounded Mplus 1c",sans-serif';
  function penFactor(){ const p=state.pen||'med'; if(p==='thin')return{ink:0.04,r:0.055}; if(p==='thick')return{ink:0.085,r:0.10}; return{ink:0.058,r:0.075}; }
  function applyPen(){ const f=penFactor(); inkW=side*f.ink; R=side*f.r; }

  function layout(){
    const wrap=cv.closest('.canvas-wrap');
    let availW=wrap.clientWidth-6, availH=wrap.clientHeight-6;
    if(!isWord){ availH-=26; availW=(availW-16)/2-4; }   // 基礎は2キャンバス（お手本＋白紙）
    availW=Math.max(200,availW); availH=Math.max(200,availH);
    const FF=(s)=>'bold '+s+'px "Hiragino Maru Gothic ProN","Rounded Mplus 1c",sans-serif';
    if(isWord && ch.length>1){
      // 長い言葉：横に大きいキャンバスにして一文字を大きく（幼児が書ける広さ）
      side=Math.min(availH, 640);
      baseOff=side*0.04;
      let fs=side*0.62;
      const oc=document.createElement('canvas').getContext('2d');
      oc.font=FF(fs); let w=oc.measureText(ch).width||1;
      const pad=side*0.5;
      if(w+pad<=availW){ cw=Math.max(side, w+pad); }
      else { const maxW=Math.max(120, availW-pad); fs=Math.floor(fs*maxW/w); oc.font=FF(fs); w=oc.measureText(ch).width||1; cw=availW; }
      fontSize=fs;
    } else {
      side=cw=Math.min(availW,availH);
      if(!useKvg){ fontSize=side*0.72; baseOff=side*0.04; }
    }
    applyPen();
    cv.style.width=cw+'px'; cv.style.height=side+'px';
    cv.width=cw*dpr; cv.height=side*dpr;
    ctx.setTransform(dpr,0,0,dpr,0,0);
    S=Math.min(8, Math.max(4, Math.round(side/58)));
    cols=Math.ceil(cw/S); rows=Math.ceil(side/S);
    if(useKvg){
      const pad=side*0.09; kscale=(side-2*pad)/109; koff=(side-109*kscale)/2;
      kpaths=HKVG[ch].map(d=>new Path2D(d));
      kstarts=HKVG[ch].map(d=>GEO.start(d));
      buildMaskKvg();
    } else {
      buildMaskFont();
    }
    if(kvgD && !useKvg){   // カタカナ等: 判定はフォント、書き順バッジ/みるは KanjiVG を重ねる
      const pad=side*0.09; kscale=(side-2*pad)/109; koff=(side-109*kscale)/2;

    target=new Uint8Array(cols*rows); totalT=0;
    for(let gy=0; gy<rows; gy++){
      for(let gx=0; gx<cols; gx++){
        const x=Math.min(cw-1, gx*S+(S>>1)), y=Math.min(side-1, gy*S+(S>>1));
        if(data[(y*cw+x)*4+3] > 100){ target[gy*cols+gx]=1; totalT++; }
      }
    }
    if(totalT===0) totalT=1;
  }
  function buildMaskKvg(){
    const off=document.createElement('canvas'); off.width=side; off.height=side;
    const o=off.getContext('2d');
    o.lineCap='round'; o.lineJoin='round'; o.strokeStyle='#000';
    o.setTransform(1,0,0,1,0,0); o.translate(koff,koff); o.scale(kscale,kscale);
    o.lineWidth=(side*0.085)/kscale;
    kpaths.forEach(p=>o.stroke(p));
    o.setTransform(1,0,0,1,0,0);
    const data=o.getImageData(0,0,side,side).data;
    target=new Uint8Array(cols*rows); totalT=0;
    for(let gy=0; gy<rows; gy++){
      for(let gx=0; gx<cols; gx++){
        const x=Math.min(side-1, gx*S+(S>>1)), y=Math.min(side-1, gy*S+(S>>1));
        if(data[(y*side+x)*4+3] > 100){ target[gy*cols+gx]=1; totalT++; }
      }
    }
    if(totalT===0) totalT=1;
  }
  function drawGuide(){
    if(useKvg){
      ctx.save(); ctx.translate(koff,koff); ctx.scale(kscale,kscale);
      ctx.lineCap='round'; ctx.lineJoin='round';
      ctx.strokeStyle='#dde6ee'; ctx.lineWidth=(side*0.075)/kscale;
      kpaths.forEach(p=>ctx.stroke(p));
      ctx.restore();
    } else {
      ctx.textAlign='center'; ctx.textBaseline='middle'; ctx.font=FONT();
      ctx.fillStyle='#dde6ee'; ctx.fillText(ch, cw/2, side/2+baseOff);
      ctx.lineWidth=2; ctx.strokeStyle='#b9c8d8'; ctx.strokeText(ch, cw/2, side/2+baseOff);
    }
  }
  function drawInk(){
    ctx.lineCap='round'; ctx.lineJoin='round'; ctx.strokeStyle='#ff7a59'; ctx.lineWidth=inkW;
    strokes.forEach(st=>{ if(st.length<2){ if(st.length===1){ ctx.beginPath(); ctx.arc(st[0].x,st[0].y,inkW*0.5,0,7); ctx.fillStyle='#ff7a59'; ctx.fill(); } return; } ctx.beginPath(); st.forEach((p,i)=> i?ctx.lineTo(p.x,p.y):ctx.moveTo(p.x,p.y)); ctx.stroke(); });
  }
  function drawOrder(force){
    if(!ORDER_ON && !force) return;
    let pts;
    if(kvgD && kstarts){
      pts=kstarts.map(s=>({x:koff+s.x*kscale, y:koff+s.y*kscale, dx:s.dx, dy:s.dy}));
    } else if(typeof STROKEPATH!=='undefined' && STROKEPATH[ch]){
      pts=STROKEPATH[ch].map(p=>{ const a=p[0], b=p[1]||p[0]; return {x:a[0]*cw, y:a[1]*side, dx:b[0]-a[0], dy:b[1]-a[1]}; });
    } else {
      const list=STROKES[ch]; if(!list) return;
      pts=list.map(s=>({x:s[0]*cw, y:s[1]*side, dx:s[2], dy:s[3]}));
    }
    const placed=[], rC=side*0.046, minD=rC*1.85;
    pts.forEach((p,i)=>{
      const mag=Math.hypot(p.dx,p.dy)||1, ux=p.dx/mag, uy=p.dy/mag;
      let x=p.x, y=p.y, tries=0;
      while(tries<6 && placed.some(q=>Math.hypot(q.x-x,q.y-y)<minD)){ x+=ux*minD*0.75; y+=uy*minD*0.75; tries++; }
      placed.push({x,y});
      const L=side*0.085, ax=x+ux*L, ay=y+uy*L;
      ctx.lineCap='round'; ctx.strokeStyle='#ff2d6f'; ctx.lineWidth=Math.max(2,side*0.008);
      ctx.beginPath(); ctx.moveTo(x,y); ctx.lineTo(ax,ay); ctx.stroke();
      const ang=Math.atan2(ay-y,ax-x), hl=side*0.032;
      ctx.beginPath(); ctx.moveTo(ax,ay);
      ctx.lineTo(ax-hl*Math.cos(ang-0.5), ay-hl*Math.sin(ang-0.5));
      ctx.lineTo(ax-hl*Math.cos(ang+0.5), ay-hl*Math.sin(ang+0.5));
      ctx.closePath(); ctx.fillStyle='#ff2d6f'; ctx.fill();
      ctx.beginPath(); ctx.arc(x,y,rC,0,7); ctx.fillStyle='#ff2d6f'; ctx.fill();
      ctx.lineWidth=Math.max(1.5,side*0.006); ctx.strokeStyle='#fff'; ctx.stroke();
      ctx.fillStyle='#fff'; ctx.font='bold '+(side*0.052)+'px sans-serif'; ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.fillText(String(i+1), x, y+side*0.004);
    });
  }
  function redraw(){ ctx.clearRect(0,0,cv.width,cv.height); drawGuide(); drawInk(); drawOrder(); }

  // ---- 「みる」: 正しい書き順を一画ずつ書いて見せる ----
  function densify(poly){ const out=[]; for(let i=0;i<poly.length-1;i++){ const a=poly[i],b=poly[i+1],seg=10; for(let s=0;s<seg;s++) out.push({x:(a[0]+(b[0]-a[0])*s/seg)*cw, y:(a[1]+(b[1]-a[1])*s/seg)*side}); } const L=poly[poly.length-1]; out.push({x:L[0]*cw,y:L[1]*side}); return out; }
  function demoStrokes(){
    if(kvgD) return kvgD.map(d=> GEO.samples(d,3).map(p=>({x:koff+p.x*kscale, y:koff+p.y*kscale})) );
    if(typeof STROKEPATH!=='undefined' && STROKEPATH[ch]) return STROKEPATH[ch].map(poly=>densify(poly));
    return null;
  }
  function playStrokes(){
    if(playing) return; const demo=demoStrokes(); if(!demo) return;
    playing=true; clearTimeout(settleT);
    const safety=setTimeout(()=>{ playing=false; if(document.body.contains(cv)) redraw(); }, 9000); // 固まり防止
    const drawn=[]; let si=0;
    const drawPoly=pts=>{ if(pts.length<2)return; ctx.beginPath(); pts.forEach((p,i)=> i?ctx.lineTo(p.x,p.y):ctx.moveTo(p.x,p.y)); ctx.stroke(); };
    function frameDraw(active){
      ctx.clearRect(0,0,cv.width,cv.height); drawGuide();
      ctx.lineCap='round'; ctx.lineJoin='round'; ctx.strokeStyle='#ff7a59'; ctx.lineWidth=inkW;
      drawn.forEach(drawPoly); if(active) drawPoly(active);
      drawOrder(true);
      if(active&&active.length){ const p=active[active.length-1]; ctx.beginPath(); ctx.arc(p.x,p.y,side*0.03,0,7); ctx.fillStyle='#ff2d6f'; ctx.fill(); ctx.lineWidth=Math.max(2,side*0.008); ctx.strokeStyle='#fff'; ctx.stroke(); }
    }
    function playOne(){
      if(!document.body.contains(cv)){ playing=false; return; }
      if(si>=demo.length){ playing=false; clearTimeout(safety); setTimeout(()=>{ if(document.body.contains(cv)) redraw(); }, 600); return; }
      const pts=demo[si]; let k=1; const step=Math.max(1,Math.round(pts.length/36));
      (function frame(){
        if(!document.body.contains(cv)){ playing=false; return; }
        k+=step; const active=pts.slice(0,Math.min(k,pts.length)); frameDraw(active);
        if(k<pts.length) requestAnimationFrame(frame);
        else { drawn.push(pts); si++; setTimeout(playOne,350); }
      })();
    }
    playOne();
  }

  function pt(e){ const r=cv.getBoundingClientRect(); return {x:e.clientX-r.left, y:e.clientY-r.top}; }
  function mark(p){
    const gx0=Math.max(0,Math.floor((p.x-R)/S)), gx1=Math.min(cols-1,Math.floor((p.x+R)/S));
    const gy0=Math.max(0,Math.floor((p.y-R)/S)), gy1=Math.min(rows-1,Math.floor((p.y+R)/S));
    const R2=R*R;
    for(let gy=gy0; gy<=gy1; gy++){
      for(let gx=gx0; gx<=gx1; gx++){
        const idx=gy*cols+gx;
        if(target[idx] && !covered[idx]){
          const cx=gx*S+(S>>1), cy=gy*S+(S>>1);
          if((p.x-cx)**2+(p.y-cy)**2 <= R2){ covered[idx]=1; coveredN++; }
        }
      }
    }
  }
  const coverage=()=> coveredN/totalT;

  cv.addEventListener('pointerdown',e=>{ if(done||playing)return; clearTimeout(settleT); if(penSeen&&e.pointerType==='touch')return; if(e.pointerType==='pen')penSeen=true; e.preventDefault(); drawing=true; const p=pt(e); strokes.push([p]); mark(p); try{cv.setPointerCapture(e.pointerId);}catch(_){} redraw(); });
  cv.addEventListener('pointermove',e=>{ if(!drawing||done||playing)return; if(penSeen&&e.pointerType==='touch')return; e.preventDefault(); const p=pt(e); strokes[strokes.length-1].push(p); mark(p); redraw(); });
  // 判定は自動ではなく「✓ できた」タップで（途中で切れて誤判定されないように）
  const lift=()=>{ if(!drawing)return; drawing=false; };
  cv.addEventListener('pointerup',lift); cv.addEventListener('pointercancel',lift);
  // iOS: keep the page from scrolling / bouncing while drawing
  cv.addEventListener('touchstart',e=>e.preventDefault(),{passive:false});
  cv.addEventListener('touchmove',e=>e.preventDefault(),{passive:false});

  // 白紙キャンバス（お手本なし・判定なし・じぶんで かく）
  const cv2=$('#cv2'); let ctx2=null, fstrokes=[], fdraw=false, fpenSeen=false;
  function fsize(){ if(!cv2||!ctx2)return; cv2.style.width=side+'px'; cv2.style.height=side+'px'; cv2.width=side*dpr; cv2.height=side*dpr; ctx2.setTransform(dpr,0,0,dpr,0,0); fredraw(); }
  function fredraw(){ if(!ctx2)return; ctx2.clearRect(0,0,cv2.width,cv2.height); ctx2.lineCap='round'; ctx2.lineJoin='round'; ctx2.strokeStyle='#ff7a59'; ctx2.lineWidth=inkW; fstrokes.forEach(st=>{ if(st.length<2){ if(st.length===1){ ctx2.beginPath(); ctx2.arc(st[0].x,st[0].y,inkW*0.5,0,7); ctx2.fillStyle='#ff7a59'; ctx2.fill(); } return; } ctx2.beginPath(); st.forEach((p,i)=> i?ctx2.lineTo(p.x,p.y):ctx2.moveTo(p.x,p.y)); ctx2.stroke(); }); }
  function fpt(e){ const r=cv2.getBoundingClientRect(); return {x:e.clientX-r.left,y:e.clientY-r.top}; }
  if(cv2){
    ctx2=cv2.getContext('2d');
    cv2.addEventListener('pointerdown',e=>{ if(playing)return; if(fpenSeen&&e.pointerType==='touch')return; if(e.pointerType==='pen')fpenSeen=true; e.preventDefault(); fdraw=true; fstrokes.push([fpt(e)]); fredraw(); try{cv2.setPointerCapture(e.pointerId);}catch(_){} });
    cv2.addEventListener('pointermove',e=>{ if(!fdraw||playing)return; if(fpenSeen&&e.pointerType==='touch')return; e.preventDefault(); fstrokes[fstrokes.length-1].push(fpt(e)); fredraw(); });
    const flift=()=>{ fdraw=false; };
    cv2.addEventListener('pointerup',flift); cv2.addEventListener('pointercancel',flift);
    cv2.addEventListener('touchstart',e=>e.preventDefault(),{passive:false});
    cv2.addEventListener('touchmove',e=>e.preventDefault(),{passive:false});
  }
  // 開いたら ①読み上げ → ②1拍おいて お手本を自動でなぞる
  function autoFlow(){
    if(isWord){ setTimeout(()=>speak(cat.say(ch), cat.lang),420); return; }
    speak(cat.say(ch), cat.lang);
    setTimeout(()=>{ if(document.body.contains(cv)) playStrokes(); }, 1100);
  }

  $('#clear').onclick=()=>{ if(playing)return; clearTimeout(settleT); strokes=[]; covered=new Uint8Array(cols*rows); coveredN=0; done=false; redraw(); fstrokes=[]; fredraw(); };
  { const wb=$('#watch'); if(wb) wb.onclick=()=>{ playStrokes(); }; }
  $('#done').onclick=()=>{
    if(playing||done) return;
    if(coverage()>=acceptLine){ success(); }
    else {
      const lb=$('.trace-label');
      if(lb){ const o=lb.innerHTML; lb.innerHTML='もうすこし なぞってね 🖍️'; lb.style.color='#ff2d6f';
        setTimeout(()=>{ const cur=$('.trace-label'); if(cur===lb){ lb.innerHTML=o; lb.style.color=''; } },1300); }
    }
  };

  function success(){
    if(done || !document.body.contains(cv))return; done=true; drawing=false;
    chime('correct'); speak(cat.say(ch), cat.lang);
    const firstTime=!state.done[dk(key,ch)];
    state.done[dk(key,ch)]=true;
    if(firstTime){ if(!Array.isArray(state.cars)) state.cars=[];
      let ci=(key==='train' && typeof TRAIN_BY_YOMI!=='undefined' && TRAIN_BY_YOMI[ch]) ? JR_LINES.indexOf(TRAIN_BY_YOMI[ch]) : JR_LINES.indexOf(nextRewardLine());
      state.cars.push(ci<0?0:ci); }
    saveState();
    setTimeout(()=>renderReward(key,ch,firstTime),650);
  }

  requestAnimationFrame(()=>{ layout(); fsize(); autoFlow(); });
  let rT; window.addEventListener('resize', ()=>{ clearTimeout(rT); rT=setTimeout(()=>{ layout(); fsize(); },150); });
}

function collectionTrainHtml(markLast){
  const cars=state.cars||[];
  let h='<span class="ceng"><span class="ceng-body"><span class="ceng-win"></span><span class="ceng-light"></span></span><b class="ccar-wheel" style="left:16%"></b><b class="ccar-wheel" style="right:16%"></b></span>';
  cars.forEach((idx,i)=>{
    const line=JR_LINES[idx]||JR_LINES[0];
    const bars=line.stripes.map(c=>`<i style="background:${c}"></i>`).join('');
    const isNew=markLast && i===cars.length-1;
    h+='<span class="ccpl"></span>'
      +'<span class="ccar'+(isNew?' newcar':'')+'">'
      +'<span class="ccar-body"><span class="ccar-win"></span><span class="ccar-stripe">'+bars+'</span></span>'
      +'<b class="ccar-wheel" style="left:14%"></b><b class="ccar-wheel" style="right:14%"></b>'
      +'</span>';
  });
  if(!cars.length) h+='<span class="cnone">（0りょう）</span>';
  return h;
}

/* ---------- reward scene (big train passes, type-distinct shape) ---------- */
function bigTrainHtml(line){
  const wins='<span></span>'.repeat(3);
  const stripes=line.stripes.map(c=>`<i style="background:${c}"></i>`).join('');
  const mid=()=>`<div class="bt-car"><div class="bt-pan"></div>`
    +`<div class="bt-body"><div class="bt-win">${wins}</div><div class="bt-stripe">${stripes}</div></div>`
    +`<b class="bt-wheel" style="left:16%"></b><b class="bt-wheel" style="right:16%"></b></div>`;
  const front=`<div class="bt-car bt-front">`
    +`<div class="bt-body"><div class="bt-win">${wins}</div><div class="bt-stripe">${stripes}</div><div class="bt-head"></div></div>`
    +`<b class="bt-wheel" style="left:16%"></b><b class="bt-wheel" style="right:30%"></b></div>`;
  return mid()+'<b class="bt-coupler"></b>'+mid()+'<b class="bt-coupler"></b>'+front;
}
function renderReward(key, ch, isNew){
  const cars=state.cars||[];
  let line;
  if(key==='train' && typeof TRAIN_BY_YOMI!=='undefined' && TRAIN_BY_YOMI[ch]){ line=TRAIN_BY_YOMI[ch]; }   // でんしゃ=なぞった路線
  else if(isNew && cars.length){ line=JR_LINES[cars[cars.length-1]]||JR_LINES[0]; }   // 初クリア=連結した顔つき電車
  else { line=nextRewardLine(); }   // 再クリアも顔つき電車を循環
  const kind=line.kind==='sk'?'sk':(line.kind==='ltd'?'ltd':'loc');
  const em=line.kind==='sk'?'🚅':(line.kind==='ltd'?'🚄':'🚃');
  const img=(typeof TRAINIMG!=='undefined')?TRAINIMG[line.name]:null;   // その路線の画像があれば使う
  if(img){ if(!state.trains) state.trains={}; if(!state.trains[line.name]){ state.trains[line.name]=true; saveState(); } }   // 顔つき電車をコレクション
  const trainHtml=img?`<img class="bt-img" src="${img}" alt="">`:bigTrainHtml(line);
  const btCls=img?'bigtrain imgmode':'bigtrain kind-'+kind;
  app.innerHTML=`
  <div class="screen reward-screen">
    ${clouds()}
    <div class="reward-cap"><b style="background:${line.stripes[0]}"></b>${em} ${lineYomi(line)}</div>
    <div class="${btCls}" id="bt">${trainHtml}</div>
    <div class="reward-hint">タッチで つぎへ ▶</div>
  </div>`;
  confetti();
  speak(lineYomi(line),'ja-JP');
  let advanced=false, ready=false;
  setTimeout(()=>{ ready=true; }, 500);
  const go=()=>{ if(advanced)return; advanced=true; renderComplete(key,ch,isNew); };
  const bt=$('#bt'); if(bt) bt.addEventListener('animationend',()=>setTimeout(go,250));
  const sc=$('.reward-screen'); if(sc) sc.addEventListener('pointerdown',()=>{ if(ready) go(); });
  // 画像トレイン：デコード成功＆描画確定まで走らせない／失敗は必ずCSSの電車に切替(空欄にしない)／壊れキャッシュは自己修復
  if(img && bt){
    let started=false, swapped=false;
    const startAnim=()=>{ if(started||swapped)return; started=true; bt.style.animationPlayState='running'; };
    const paintThenStart=()=>{ requestAnimationFrame(()=>requestAnimationFrame(startAnim)); };  // 実描画を1フレーム待ってから動かす
    const toCss=()=>{ if(swapped||!document.body.contains(bt))return; swapped=true; started=true;
      bt.className='bigtrain kind-'+kind; bt.innerHTML=bigTrainHtml(line);
      bt.style.animation='none'; void bt.offsetWidth; bt.style.animation=''; bt.style.animationPlayState='running';  // 左端から走り直す
      try{ if(window.caches) caches.keys().then(ks=>ks.forEach(k=>caches.open(k).then(c=>c.delete(img)))); fetch(img,{cache:'reload'}).catch(()=>{}); }catch(e){}  // 壊れたキャッシュを捨てて取り直し
    };
    bt.style.animationPlayState='paused';
    const imgEl=bt.querySelector('img');
    if(imgEl){
      imgEl.addEventListener('error', toCss, {once:true});
      if(imgEl.decode){ imgEl.decode().then(paintThenStart).catch(toCss); }   // iOSの唯一確実な合図＝decode
      else { imgEl.addEventListener('load', paintThenStart, {once:true}); if(imgEl.complete && imgEl.naturalWidth>0) paintThenStart(); }
    }
    setTimeout(()=>{ if(started||swapped)return; const el=bt.querySelector('img'); if(el && el.naturalWidth>0) startAnim(); else toCss(); }, 1800);  // 遅すぎたら中身を見て：読めてれば直接走らせる／ダメならCSS電車
  }
  setTimeout(go,7000); // safety auto-advance
}

/* ---------- complete ---------- */
function renderComplete(key, ch, isNew){
  const cat=catOf(key);
  const idx=cat.chars.indexOf(ch);
  const nextCh = idx+1<cat.chars.length ? cat.chars[idx+1] : null;
  const cars=state.cars||[];
  const newLine = (isNew && cars.length) ? JR_LINES[cars[cars.length-1]] : null;
  const em = newLine ? (newLine.kind==='sk'?'🚅':(newLine.kind==='ltd'?'🚄':'🚃')) : '';
  // カテゴリ達成バッジ（すうじ全部・ひらがな全部 など）
  if(!state.badges) state.badges={};
  const catDone = cat.chars.every(c=>state.done[dk(key,c)]);
  const justBadge = catDone && !state.badges[key];
  if(justBadge){ state.badges[key]=true; saveState(); }
  const allDone = CATS.every(c=>c.chars.every(cc=>state.done[dk(c.key,cc)]));
  const justGrand = allDone && !state.badges['__all__'];
  if(justGrand){ state.badges['__all__']=true; saveState(); }
  const badgeHtml = justGrand
    ? `<div class="badge-won grand">🏆<div>ぜんぶ できた！<small>でんしゃ はかせ にんてい！</small></div></div>`
    : justBadge
    ? `<div class="badge-won">🏅<div>「${cat.label}」ぜんぶ できた！<small>メダル ゲット！</small></div></div>` : '';
  // もじ等を5こクリアするごとに あたらしい顔つき電車が2本なかまいり（あいうえお→2本、アイウエオ→2本…）
  let trainUnlockHtml='';
  if(isNew && key!=='train'){
    const dc=catDoneCount(key);
    const crossed=Math.floor(dc/5)>Math.floor(Math.max(0,dc-1)/5);
    if(crossed){
      const rawNow=trainRawCount();
      const nowN=Math.min(TRAIN_LINES.length, rawNow);
      const prevN=Math.min(TRAIN_LINES.length, Math.max(0, rawNow-2));
      const gained=TRAIN_LINES.slice(prevN,nowN);
      if(gained.length){
        const pics=gained.map(l=>`<img src="${TRAINIMG[l.name]}" style="height:38px; width:auto;" alt="">`).join('');
        trainUnlockHtml=`<div class="badge-won">🚃<div>あたらしい でんしゃ が ${gained.length}りょう なかまいり！<br>${pics}</div></div>`;
      }
    }
  }
  // あいうえお 全クリア → のりもの・こんちゅう 等 解放
  const justUnlock = key==='hira' && hiraRemaining()===0 && !state.unlockAnnounced;
  if(justUnlock){ state.unlockAnnounced=true; saveState(); }
  const unlockHtml = justUnlock
    ? `<div class="badge-won grand">🎉<div>のりもの・こんちゅう が つかえる！<small>あたらしい なぞりが ふえたよ</small></div></div>` : '';
  app.innerHTML=`
  <div class="screen complete">
    ${clouds()}
    <div class="big-emoji">🚂✨</div>
    <h2>できたね！</h2>
    <div class="gotc${cat.word?' word':''}">${ch}</div>
    ${newLine
      ? `<div class="newline">${em} ${lineYomi(newLine)} が れんけつ！<br><small>ぜんぶで ${cars.length} りょう</small></div>`
      : `<div class="newline"><small>ぜんぶで ${cars.length} りょう</small></div>`}
    ${unlockHtml}${badgeHtml}${trainUnlockHtml}
    <div class="ctrain" id="ctrain">${collectionTrainHtml(isNew)}</div>
    <div class="footer-btns" style="margin-top:14px;">
      ${nextCh!==null?'<button class="btn grass big" id="next">つぎ →</button>':'<button class="btn big" id="next">🎉 さいごまで できた！</button>'}
      <button class="btn ghost" id="grid">えらぶ がめんへ</button>
    </div>
  </div>`;
  confetti();
  if(justBadge||justGrand||justUnlock||trainUnlockHtml){ chime('correct'); setTimeout(confetti,260); setTimeout(confetti,520); }
  if(justUnlock){ setTimeout(()=>{ try{speak('のりもの と こんちゅう が つかえるよ','ja-JP');}catch(e){} }, 400); }
  const ct=$('#ctrain'); if(ct) ct.scrollLeft=ct.scrollWidth;
  $('#grid').onclick=()=>renderGrid(key);
  $('#next').onclick=()=>{ if(nextCh!==null) renderTrace(key,nextCh); else renderGrid(key); };
}

/* ---------- boot ---------- */
(function(){ loadState(); ORDER_ON = state.orderOn!==false; if(!Array.isArray(state.cars)) state.cars=[]; if(!state.badges) state.badges={}; if(!state.trains) state.trains={}; if(!state.pen) state.pen='med'; if(state.voice===undefined && VVS && VVS[ZUNDA]) state.voice=ZUNDA; renderTitle(); })();
/* 電車画像を先読み（初回のごほうびで「空欄のまま通過」しないように） */
/* 電車画像を先読み。参照を保持しないと iOS で読み込み前にGCされることがあるので配列で保持 */
window.__trainPreload=[];
(function preloadTrainImgs(){ try{ Object.keys(TRAINIMG).forEach(function(k){ var im=new Image(); im.src=TRAINIMG[k]; window.__trainPreload.push(im); }); }catch(e){} })();
if('serviceWorker' in navigator){
  navigator.serviceWorker.addEventListener('controllerchange', function(){ if(window.__swReloaded)return; window.__swReloaded=true; location.reload(); });  // 新SWが有効化されたら1回だけ再読込（古い版のまま残るのを防ぐ）
  window.addEventListener('load', function(){ navigator.serviceWorker.register('sw.js').then(function(reg){ try{reg.update();}catch(e){} }).catch(function(){}); });
}
</script>
